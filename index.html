<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nik's Daily Brief</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eaeaea;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .date {
            font-size: 0.9rem;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .location { color: #64ffda; font-size: 1.1rem; }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .card-header .icon { font-size: 1.5rem; margin-right: 10px; }
        .weather-card { display: flex; align-items: center; justify-content: space-between; }
        .weather-main { font-size: 3rem; font-weight: 300; }
        .weather-desc { color: #8892b0; margin-top: 5px; }
        .weather-icon { font-size: 4rem; }
        .badge {
            display: inline-block;
            background: rgba(100, 255, 218, 0.1);
            color: #64ffda;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-left: 10px;
        }
        .badge.pending { background: rgba(239, 1, 7, 0.1); color: #ef0107; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .stat-box {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-number { font-size: 2rem; font-weight: 600; color: #64ffda; }
        .stat-label { font-size: 0.9rem; color: #8892b0; margin-top: 5px; }
        .footer {
            text-align: center;
            padding: 30px;
            color: #8892b0;
            font-size: 0.9rem;
        }
        .task-list { list-style: none; margin-top: 10px; }
        .task-list li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .task-list li:last-child { border-bottom: none; }
        .refresh-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            margin-top: 20px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .refresh-btn:hover { opacity: 0.9; }
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .weather-main { font-size: 2rem; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="date">Tuesday, March 3, 2026</div>
            <h1>Morning Brief</h1>
            <div class="location">📍 Princeton, NJ</div>
        </header>

        <div class="card">
            <div class="card-header">
                <span class="icon">🌤️</span>
                Weather
            </div>
            <div class="weather-card">
                <div>
                    <div class="weather-main">36°F</div>
                    <div class="weather-desc">Feels like 32°F</div>
                </div>
                <div class="weather-icon">☁️</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="icon">📊</span>
                Daily Snapshot
            </div>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-number">10</div>
                    <div class="stat-label">Unread Emails</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">1</div>
                    <div class="stat-label">Tasks Due</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">1</div>
                    <div class="stat-label">Habits Pending</div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <span class="icon">✅</span>
                Tasks
            </div>
            <ul class="task-list">
                <li>Get the contact lens prescription updated</li>
            </ul>
        </div>
        <div class="footer">
            Last updated: 10:56 PM<br>
            <a href="https://github.com/nikhilist/morning-brief" class="refresh-btn">View on GitHub</a>
        </div>
    </div>
</body>
</html>
